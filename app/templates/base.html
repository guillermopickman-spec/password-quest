<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Password Quest - Gamified password security training">
    
    <title>{% block title %}Password Quest{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- HTMX for dynamic updates -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Tailwind Config for Dark Mode -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        quest: {
                            dark: '#0f172a',
                            card: '#1e293b',
                            accent: '#3b82f6',
                            success: '#10b981',
                            warning: '#f59e0b',
                            danger: '#ef4444',
                            purple: '#8b5cf6'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        glow: {
                            '0%': { boxShadow: '0 0 5px #3b82f6, 0 0 10px #3b82f6' },
                            '100%': { boxShadow: '0 0 20px #3b82f6, 0 0 30px #3b82f6' }
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Custom Styles -->
    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
        
        /* Strength meter colors */
        .strength-0 { background: linear-gradient(90deg, #ef4444, #dc2626); }
        .strength-1 { background: linear-gradient(90deg, #f97316, #ea580c); }
        .strength-2 { background: linear-gradient(90deg, #eab308, #ca8a04); }
        .strength-3 { background: linear-gradient(90deg, #22c55e, #16a34a); }
        .strength-4 { background: linear-gradient(90deg, #10b981, #059669); }
        
        /* Glow effects */
        .glow-red { box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
        .glow-green { box-shadow: 0 0 20px rgba(16, 185, 129, 0.5); }
        .glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        
        /* Hacker alert animation */
        @keyframes hacker-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.02); }
        }
        .hacker-alert {
            animation: hacker-pulse 1s ease-in-out infinite;
        }
    </style>
    
    <!-- Alpine.js for interactivity -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-quest-dark text-gray-100 min-h-screen font-sans">
    
    <!-- Navigation Bar -->
    <nav class="bg-quest-card border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-quest-accent to-quest-purple rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                    </div>
                    <span class="text-xl font-bold bg-gradient-to-r from-quest-accent to-quest-purple bg-clip-text text-transparent">
                        Password Quest
                    </span>
                </div>
                
                <!-- Navigation Links -->
                <div class="hidden md:flex items-center space-x-6 mr-8">
                    <a href="{{ url_for('main.index') }}" class="text-gray-300 hover:text-white transition">Dashboard</a>
                    <a href="{{ url_for('main.challenges') }}" class="text-gray-300 hover:text-quest-accent transition flex items-center space-x-1">
                        <span>Challenges</span>
                        <span id="nav-challenge-count" class="bg-quest-accent text-white text-xs px-2 py-0.5 rounded-full hidden">0/3</span>
                    </a>
                    <a href="{{ url_for('main.leaderboard') }}" class="text-gray-300 hover:text-white transition">Leaderboard</a>
                </div>

                <!-- Level, Streak & XP Display -->
                <div class="flex items-center space-x-4">
                    <!-- Streak Display -->
                    <div id="streak-display-container" class="hidden flex items-center space-x-1 bg-orange-500/20 px-3 py-1 rounded-full">
                        <span class="text-xl">🔥</span>
                        <span id="streak-display" class="text-orange-400 font-bold">0</span>
                    </div>
                    
                    <!-- Daily Check-in Button -->
                    <button id="checkin-btn" onclick="handleCheckin()" class="hidden bg-quest-success hover:bg-green-600 text-white text-sm font-semibold px-3 py-1 rounded-full transition">
                        Check In
                    </button>
                    
                    <div class="flex items-center space-x-2">
                        <span class="text-quest-purple font-semibold">Lvl</span>
                        <span id="user-level" class="text-white font-bold text-lg">1</span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <span class="text-quest-success font-semibold">XP</span>
                        <span id="user-xp" class="text-white font-bold text-sm">0/1000</span>
                    </div>
                    <div class="hidden md:flex w-24 h-2 bg-gray-700 rounded-full overflow-hidden">
                        <div id="xp-bar" class="w-0 h-full bg-gradient-to-r from-quest-success to-quest-accent transition-all duration-500"></div>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>
    
    <!-- Footer -->
    <footer class="bg-quest-card border-t border-gray-800 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex flex-col md:flex-row items-center justify-between text-sm text-gray-500">
                <p>&copy; 2024 Password Quest - Enterprise Security Training</p>
                <div class="flex items-center space-x-4 mt-4 md:mt-0">
                    <a href="#" class="hover:text-quest-accent transition">Privacy</a>
                    <a href="#" class="hover:text-quest-accent transition">Terms</a>
                    <span class="flex items-center space-x-1">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                        </svg>
                        <span>Zero Password Logging</span>
                    </span>
                </div>
            </div>
        </div>
    </footer>
    
    
    <!-- Progress Update Script -->
    <script>
    // Fetch and update user progress
    async function updateUserProgress() {
        try {
            const response = await fetch('/api/progress');
            const data = await response.json();
            
            if (data.level !== undefined) {
                document.getElementById('user-level').textContent = data.level;
            }
            
            if (data.xp) {
                const xpText = `${data.xp.current_level}/${data.xp.required_for_next}`;
                document.getElementById('user-xp').textContent = xpText;
                
                const percentage = (data.xp.current_level / data.xp.required_for_next) * 100;
                document.getElementById('xp-bar').style.width = percentage + '%';
            }
            
            // Show streak display
            const streakContainer = document.getElementById('streak-display-container');
            const streakElement = document.getElementById('streak-display');
            if (data.streak && data.streak.current_streak > 0) {
                streakElement.textContent = data.streak.current_streak;
                streakContainer.classList.remove('hidden');
            } else {
                streakContainer.classList.add('hidden');
            }
            
            // Show check-in button if available
            const checkinBtn = document.getElementById('checkin-btn');
            if (data.streak && data.streak.can_checkin) {
                checkinBtn.classList.remove('hidden');
            } else {
                checkinBtn.classList.add('hidden');
            }
            
            // Update challenge progress in nav
            const challengeCount = document.getElementById('nav-challenge-count');
            if (data.challenges && Object.keys(data.challenges).length > 0) {
                const completed = Object.keys(data.challenges).length;
                challengeCount.textContent = `${completed}/3`;
                challengeCount.classList.remove('hidden');
            }
            
        } catch (error) {
            console.log('Progress update failed (this is normal for new users)');
        }
    }
    
    // Handle daily check-in
    async function handleCheckin() {
        const checkinBtn = document.getElementById('checkin-btn');
        checkinBtn.disabled = true;
        checkinBtn.textContent = 'Checking...';
        
        try {
            const response = await fetch('/api/progress/checkin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            
            const data = await response.json();
            
            if (data.success) {
                // Show success notification
                showNotification('🎉 ' + data.message, 'success');
                
                // Update streak display
                const streakContainer = document.getElementById('streak-display-container');
                const streakElement = document.getElementById('streak-display');
                streakElement.textContent = data.current_streak;
                streakContainer.classList.remove('hidden');
                
                // Hide check-in button
                checkinBtn.classList.add('hidden');
                
                // Refresh progress to show updated XP
                updateUserProgress();
            } else {
                showNotification(data.message, 'info');
            }
        } catch (error) {
            console.error('Check-in failed:', error);
            showNotification('Check-in failed. Please try again.', 'error');
        } finally {
            checkinBtn.disabled = false;
            checkinBtn.textContent = 'Check In';
        }
    }
    
    // Show notification toast
    function showNotification(message, type = 'info') {
        let notifContainer = document.getElementById('notification-container');
        if (!notifContainer) {
            notifContainer = document.createElement('div');
            notifContainer.id = 'notification-container';
            notifContainer.className = 'fixed top-20 right-4 z-50 space-y-2';
            document.body.appendChild(notifContainer);
        }
        
        const colors = {
            success: 'bg-quest-success',
            error: 'bg-quest-danger',
            info: 'bg-quest-accent'
        };
        
        const notif = document.createElement('div');
        notif.className = `${colors[type]} text-white px-4 py-3 rounded-lg shadow-lg transform translate-x-full transition-transform duration-300`;
        notif.textContent = message;
        notifContainer.appendChild(notif);
        
        // Animate in
        setTimeout(() => notif.classList.remove('translate-x-full'), 100);
        
        // Remove after 3 seconds
        setTimeout(() => {
            notif.classList.add('translate-x-full');
            setTimeout(() => notif.remove(), 300);
        }, 3000);
    }
    
    // Update on page load
    document.addEventListener('DOMContentLoaded', updateUserProgress);
    </script>
    
    {% block extra_scripts %}{% endblock %}
</body>
</html>
